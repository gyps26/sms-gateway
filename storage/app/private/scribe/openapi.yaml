          description: 'Filter by campaign status.'
          example: Sent
          required: false
          schema:
            type: string
            description: 'Filter by campaign status.'
            example: Sent
            nullable: true
            enum:
              - Queued
              - Processing
              - Processed
              - Scheduled
              - Completed
        -
          in: query
          name: type
          description: 'Filter by campaign type.'
          example: MMS
          required: false
          schema:
            type: string
            description: 'Filter by campaign type.'
            example: MMS
            nullable: true
            enum:
              - SMS
              - MMS
              - WhatsApp
              - 'USSD Pull'
        -
          in: query
          name: recurring
          description: 'Filter by recurring campaigns.'
          example: true
          required: false
          schema:
            type: boolean
            description: 'Filter by recurring campaigns.'
            example: true
            nullable: true
        -
          in: query
          name: after
          description: 'Filter by campaigns after a certain date. Must be a valid date in the format <code>Y-m-d</code>. Must be a date before or equal to <code>before</code>.'
          example: '2021-01-01'
          required: false
          schema:
            type: string
