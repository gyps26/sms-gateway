    url: '{{ config("app.url") }}'
tags:
  -
    name: 'Call Log'
    description: 'Call Log'
  -
    name: Campaigns
    description: Campaigns
  -
    name: 'Contact Lists'
    description: 'Contact Lists'
  -
    name: Contacts
    description: Contacts
  -
    name: Devices
    description: Devices
  -
    name: Messages
    description: Messages
  -
    name: SenderIds
    description: SenderIds
  -
    name: 'Sending Servers'
    description: 'Sending Servers'
  -
    name: 'USSD Pulls'
    description: 'USSD Pulls'
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your token by visiting your dashboard and clicking <b>Generate API token</b>.'
security:
  -
    default: []
paths:
  /api/v1/calls:
    get:
      summary: 'List all calls'
      operationId: listAllCalls
      description: 'Returns a list of calls. The calls are returned sorted by creation date, with the most recently created call appearing first.'
      parameters:
        -
          in: query
          name: type
          description: 'Filter by call type.'
          example: Incoming
          required: false
          schema:
            type: string
            description: 'Filter by call type.'
            example: Incoming
            nullable: true
            enum:
              - Incoming
              - Outgoing
              - Missed
              - Voicemail
              - Rejected
              - Blocked
              - 'Answered Externally'
        -
          in: query
          name: sim
          description: 'Filter by SIM ID. Must be at least 1.'
          example: 1.0
          required: false
          schema:
            type: number
            description: 'Filter by SIM ID. Must be at least 1.'
            example: 1.0
            nullable: true
        -
          in: query
          name: answered
          description: ''
          example: false
          required: false
          schema:
            type: boolean
            description: ''
            example: false
            nullable: true
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 141
                      number: 973-450-3511
                      type: Missed
                      sim_id: 1
                      started_at: '1991-01-07T14:12:01.000000Z'
                      duration: 1912
                    -
                      id: 142
                      number: 724-602-7973
                      type: Voicemail
                      sim_id: 1
                      started_at: '1988-04-26T00:07:31.000000Z'
                      duration: 1669
                  links:
                    first: '/?page=1'
                    last: '/?page=1'
                    prev: null
                    next: null
                  meta:
                    current_page: 1
                    from: 1
                    last_page: 1
                    links:
                      -
                        url: null
                        label: '&laquo; Previous'
                        page: null
                        active: false
                      -
                        url: '/?page=1'
                        label: '1'
                        page: 1
                        active: true
                      -
                        url: null
                        label: 'Next &raquo;'
                        page: null
                        active: false
                    path: /
                    per_page: 100
                    to: 2
                    total: 2
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 141
                        number: 973-450-3511
                        type: Missed
                        sim_id: 1
                        started_at: '1991-01-07T14:12:01.000000Z'
                        duration: 1912
                      -
                        id: 142
                        number: 724-602-7973
                        type: Voicemail
                        sim_id: 1
                        started_at: '1988-04-26T00:07:31.000000Z'
                        duration: 1669
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 141
                        number:
                          type: string
                          example: 973-450-3511
                        type:
                          type: string
                          example: Missed
                        sim_id:
                          type: integer
                          example: 1
                        started_at:
                          type: string
                          example: '1991-01-07T14:12:01.000000Z'
                        duration:
                          type: integer
                          example: 1912
                    required:
                      - id
                      - number
                      - type
                      - sim_id
                      - started_at
                      - duration
                  links:
                    type: object
                    properties:
                      first:
                        type: string
                        example: '/?page=1'
                      last:
                        type: string
                        example: '/?page=1'
                      prev:
                        type: string
                        example: null
                      next:
                        type: string
                        example: null
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      from:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 1
                      links:
                        type: array
                        example:
                          -
                            url: null
                            label: '&laquo; Previous'
                            page: null
                            active: false
                          -
                            url: '/?page=1'
                            label: '1'
                            page: 1
                            active: true
                          -
                            url: null
                            label: 'Next &raquo;'
                            page: null
                            active: false
                        items:
                          type: object
                          properties:
                            url:
                              type: string
                              example: null
                            label:
                              type: string
                              example: '&laquo; Previous'
                            page:
                              type: string
                              example: null
                            active:
                              type: boolean
                              example: false
                      path:
                        type: string
                        example: /
                      per_page:
                        type: integer
                        example: 100
                      to:
                        type: integer
                        example: 2
                      total:
                        type: integer
                        example: 2
      tags:
        - 'Call Log'
  '/api/v1/calls/{id}':
    delete:
      summary: 'Delete a call'
      operationId: deleteACall
      description: 'Permanently deletes a call.'
      parameters: []
      responses:
        204:
          description: 'No content'
          content:
            application/json:
              schema:
                type: object
                nullable: true
      tags:
        - 'Call Log'
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the call.'
        example: 1
        required: true
        schema:
          type: integer
  /api/v1/campaigns:
    get:
      summary: 'List all campaigns'
