                  type: string
                  description: 'The unit of the frequency. This field is required when <code>recurring</code> is <code>true</code>.'
                  example: day
                  nullable: false
                  enum:
                    - Minute
                    - Hour
                    - Day
                    - Week
                    - Month
                    - Year
                ends_at:
                  type: string
                  description: 'The date and time when the recurring campaign ends. Must be a valid date.'
                  example: '2021-01-01T12:00:00Z'
                  nullable: false
                timezone:
                  type: string
                  description: 'The timezone of the campaign. This is used for scheduled_at, ends_at, days_of_week, and active_hours. This field is required when <code>active_hours</code>, <code>days_of_week</code>, <code>scheduled_at</code>, or <code>ends_at</code> is present. Must be a valid time zone, such as <code>Africa/Accra</code>.'
                  example: UTC
                  nullable: false
                days_of_week:
                  type: array
                  description: 'The days of the week when the campaign is active.'
                  example:
                    - 1
                  items:
                    type: string
                    enum:
                      - '1'
                      - '2'
                      - '3'
                      - '4'
                      - '5'
                      - '6'
                      - '7'
                active_hours:
                  type: object
                  description: 'Must contain 2 items.'
                  example: null
                  nullable: false
                  properties:
                    start:
                      type: string
                      description: 'The start time of the active hours. This field is required when <code>active_hours.end</code> is present. Must be a valid date in the format <code>H:i</code>. Must be a date before <code>active_hours.end</code>.'
                      example: '08:00'
                      nullable: false
                    end:
                      type: string
                      description: 'The end time of the active hours. This field is required when <code>active_hours.start</code> is present. Must be a valid date in the format <code>H:i</code>. Must be a date after <code>active_hours.start</code>.'
                      example: '17:00'
                      nullable: false
                random_sender:
                  type: boolean
                  description: 'Whether to use a random sim from selected sims for entire campaign.'
                  example: false
                  nullable: false
              required:
                - sims
                - ussd_codes
